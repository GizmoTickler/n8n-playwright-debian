name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  # Schedule weekly builds to catch base image and n8n updates
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to build (default: latest)'
        required: false
        default: 'latest'
      task_runner_version:
        description: 'Task Runner Launcher version'
        required: false
        default: '1.4.1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # For uploading Trivy SARIF results
      id-token: write  # For provenance attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract versions from Dockerfile
        id: versions
        run: |
          N8N_VER=$(grep -oP '^ARG N8N_VERSION=\K[0-9.]+' Dockerfile | head -1)
          RUNNER_VER=$(grep -oP '^ARG TASK_RUNNER_LAUNCHER_VERSION=\K[0-9.]+' Dockerfile | head -1)
          echo "n8n_version=${N8N_VER}" >> $GITHUB_OUTPUT
          echo "task_runner_version=${RUNNER_VER}" >> $GITHUB_OUTPUT
          echo "📦 Dockerfile versions - n8n: ${N8N_VER}, task-runner: ${RUNNER_VER}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Enable provenance and SBOM for supply chain security
          provenance: true
          sbom: true
          build-args: |
            N8N_VERSION=${{ github.event.inputs.n8n_version || steps.versions.outputs.n8n_version }}
            TASK_RUNNER_LAUNCHER_VERSION=${{ github.event.inputs.task_runner_version || steps.versions.outputs.task_runner_version }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
